spring.application.name=bankingbackend
server.port=8085

# Evite les conflits de port avec une 2e instance DevTools
spring.devtools.livereload.enabled=false
spring.devtools.restart.enabled=true

# Base de donnees H2 (en memoire, demarrage automatique)
spring.datasource.url=jdbc:h2:mem:banking
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Console H2 : http://localhost:8085/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=MaCleSecreteTBZkWWuUHNahSjQZtmeoQYjMvmHe1WYuCTnteQuatreCaracteresPourEtreSecurisee

# --- Partie 4 : Spring AI + RAG + Telegram ---
# Les cles sensibles vont dans application-local.properties (non versionne)
spring.config.import=optional:file:./application-local.properties

spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini

telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:DigitalBankingProjet_Bot}